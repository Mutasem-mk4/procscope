name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'

      - uses: actions/setup-python@8d9ed9a17401078d59e773f1302b3d458f23a399 # v5.5.0
        with:
          python-version: '3.11'

      - name: Run release preflight
        run: |
          python scripts/release_preflight.py --tag "${GITHUB_REF_NAME}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd36e93c2f8247542ee209578bf7352497d # v6.4.0
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
