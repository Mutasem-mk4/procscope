name: Release\n\non:\n  push:\n    tags:\n      - 'v*'\n\npermissions:\n  contents: read\n\njobs:\n  release:\n    name: Release\n    runs-on: ubuntu-latest\n    permissions:\n      contents: write\n    steps:\n      - uses: actions/checkout@v4 # v4.2.2\n        with:\n          fetch-depth: 0\n\n      - uses: actions/setup-go@v5 # v5.3.0\n        with:\n          go-version: '1.26.2'\n\n      - uses: actions/setup-python@v5 # v5.5.0\n        with:\n          python-version: '3.11'\n\n      - name: Run release preflight\n        run: |\n          python scripts/release_preflight.py --tag "${GITHUB_REF_NAME}"\n\n      - name: Run GoReleaser\n        uses: goreleaser/goreleaser-action@v6 # v6.4.0\n        with:\n          version: '~> v2'\n          args: release --clean\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n